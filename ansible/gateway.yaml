---
# Make the lab's NAT/DHCP gateway — the always-on box that gives the ESXi Internal
# vSwitch its way out. Run once against the gateway VM created by
# `make-rocky-vm.sh -g <name>` (which gives it static both-NIC networking from the
# seed). Connects as root (the handoff contract guarantees root + key).
#
#   ansible-playbook -i '<gateway-public-ip>,' gateway.yaml
#
# The gateway must be up before any worker boots, since it serves their DHCP.
- hosts: all
  remote_user: root
  roles:
    - gateway
