# The anti-fraud pod. Runs on every host of whichever group references it in
# groups.yaml (e.g. group "node-a").
#
# gearmand + a node.js worker share localhost via hostNetwork (the property the
# v2 chroot gave us for free; here it is explicit and Podman honors it).
#
# Images are local-only (localhost/...) and never pulled — vz pushes them into
# the node's containers-storage first. Validate the whole fleet with:
#   node ../../vztool/src/validate.ts ../groups.yaml
apiVersion: v1
kind: Pod
metadata:
  name: antifraud
spec:
  hostNetwork: true
  restartPolicy: Always
  containers:
    - name: gearmand
      image: localhost/gearmand:v3
      imagePullPolicy: Never
      ports:
        - containerPort: 4730  # vz apply opens this in the node firewall
    - name: dns-resolver
      image: localhost/dns-resolver:v3
      imagePullPolicy: Never
      command: ["node", "/app/index.js"]
      env:
        - name: GEARMAN_HOST
          value: "127.0.0.1"
        - name: LOG_LEVEL
          value: "info"
